repos:
  # Ruff: fast Python linter + formatter (replaces flake8 + black)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff              # linting
        args: [--fix]
      - id: ruff-format       # formatting

  # Catch secrets accidentally committed
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks          # blocks commit if API key detected in code

  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files  # blocks committing huge files accidentally
      - id: detect-private-key       # second layer of key protection
